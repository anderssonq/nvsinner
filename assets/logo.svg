<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Metal+Mania&amp;family=Pirata+One&amp;display=swap');
      .word { font-family: 'Metal Mania', 'Pirata One', 'Times New Roman', serif; }
      .mono { font-family: 'Courier New', monospace; }
    </style>

    <filter id="jagged" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.09" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <pattern id="spikes" width="26" height="20" patternUnits="userSpaceOnUse">
      <polygon points="0,20 6,4 13,20 19,2 26,20" fill="#161616"/>
    </pattern>

    <pattern id="halftone" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="2.1" fill="#161616"/>
    </pattern>
    <mask id="dissolveMask">
      <rect x="0" y="0" width="900" height="420" fill="white"/>
      <rect x="600" y="0" width="300" height="420" fill="url(#halftone)"/>
    </mask>

    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6e6e6"/>
      <stop offset="55%" stop-color="#c4c4c4"/>
      <stop offset="100%" stop-color="#8f8f8f"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" fill="#161616"/>

  <g opacity="0.08" stroke="#78a9ff" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
  </g>

  <!-- glitch echoes -->
  <g transform="translate(450,250)" filter="url(#jagged)">
    <text class="word" x="-3" y="-4" text-anchor="middle" font-size="130"
          fill="#ee5396" opacity="0.5">NvSinner</text>
    <text class="word" x="4" y="5" text-anchor="middle" font-size="130"
          fill="#78a9ff" opacity="0.45">NvSinner</text>
  </g>

  <!-- main gothic-metal wordmark -->
  <g transform="translate(450,250)" filter="url(#jagged)" mask="url(#dissolveMask)">
    <text class="word" x="0" y="0" text-anchor="middle" font-size="130"
          fill="url(#steel)" stroke="#161616" stroke-width="1.5">
      <tspan fill="#78a9ff">Nv</tspan><tspan fill="url(#steel)">Sinner</tspan>
    </text>
  </g>

  <!-- spike crown -->
  <rect x="70" y="120" width="760" height="16" fill="url(#spikes)" filter="url(#jagged)"/>

  <!-- terminal cursor nod -->
  <rect x="690" y="300" width="24" height="13" fill="#78a9ff"/>

  <text class="mono" x="450" y="368" text-anchor="middle" font-size="16"
        letter-spacing="6" fill="#5a5a5a">TERMINAL // AI AGENT IDE</text>
</svg>